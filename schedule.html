<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Busy Day Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        th {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            text-align: left;
        }
        td {
            border: 1px solid #dddddd;
            padding: 8px;
            text-align: left;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e9ecef;
        }
        .header {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1 class="header">My Busy Day Schedule</h1>
    <table>
        <tr>
            <th>Time</th>
            <th>Event</th>
        </tr>
        <tr>
            <td>6:00 AM</td>
            <td>Wake up & Exercise</td>
        </tr>
        <tr>
            <td>7:00 AM</td>
            <td>Breakfast</td>
        </tr>
        <tr>
            <td>8:00 AM</td>
            <td>Morning Commute</td>
        </tr>
        <tr>
            <td>9:00 AM</td>
            <td>Work on Project A</td>
        </tr>
        <tr>
            <td>12:00 PM</td>
            <td>Lunch Break</td>
        </tr>
        <tr>
            <td>1:00 PM</td>
            <td>Team Meeting</td>
        </tr>
        <tr>
            <td>3:00 PM</td>
            <td>Work on Project B</td>
        </tr>
        <tr>
            <td>6:00 PM</td>
            <td>Dinner with Family</td>
        </tr>
        <tr>
            <td>8:00 PM</td>
            <td>Relax and Read</td>
        </tr>
    </table>
</body>
</html>
