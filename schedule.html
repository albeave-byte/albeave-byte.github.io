<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Busy Day Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        th {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            text-align: left;
        }
        td {
            border: 1px solid #dddddd;
            padding: 8px;
            text-align: left;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e9ecef;
        }
        .header {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1 class="header">My Busy Day Schedule</h1>
    <table>
        <tr>
            <th>Time</th>
            <th>Event</th>
        </tr>
        <tr>
            <td>6:00 AM</td>
            <td>Wake up & Get ready</td>
        </tr>
        <tr>
            <td>7:00 AM</td>
            <td>Workout</td>
        </tr>
        <tr>
            <td>8:00 AM</td>
            <td>Breakfast</td>
        </tr>
        <tr>
            <td>9:00 AM</td>
            <td>Work on mulching/td>
        </tr>
        <tr>
            <td>12:00 PM</td>
            <td>Lunch </td>
        </tr>
        <tr>
            <td>1:00 PM</td>
            <td>Lacrosse Practice</td>
        </tr>
        <tr>
            <td>3:00 PM</td>
            <td>Go home from lacrosse</td>
        </tr>
        <tr>
            <td>6:00 PM</td>
            <td>Dinner</td>
        </tr>
        <tr>
            <td>8:00 PM</td>
            <td>Shower and Chill before bed</td>
        </tr>
    </table>
</body>
</html>
