 <style>
      sepia {
        border-radius: 50px;

  <h2>Seagull</h2>
     .gradient {

  </style>
    <body>
      <img src="pictures/penguins.jpg" alt="penguins" class="sepia">
      <img src="pictures/seagull.png" alt="seagull" class=".gradient">
