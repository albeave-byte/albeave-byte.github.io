    <div>
     <h2>Penguins</h2>
 <style>
      img {
        border-radius: 50px;
        background-color: white;

      img {
      border-radius: 200px 200px 200px 200px;

border: 10px solid #000000;
      }
    </style>
  <body>
     <img src="pictures/penguins.jpg" alt="penguins" width="479px" height="332px">

    <div>
  <h2>Seagull</h2>
  <style>
      img {
    box-shadow: 10px 10px 40px 0px rgba(0,0,0,0.75);
-webkit-box-shadow: 10px 10px 40px 0px rgba(0,0,0,0.75);
-moz-box-shadow: 10px 10px 40px 0px rgba(0,0,0,0.75);
      }
    img {
      background: #cb58fb;
background: linear-gradient(90deg,#cb58fb 0%, #ffffff 80%);
background: -webkit-linear-gradient(90deg,#cb58fb 0%, #ffffff 80%);
background: -moz-linear-gradient(90deg,#cb58fb 0%, #ffffff 80%);
    }

      <img src="pictures/seagull.png" alt="seagull" width="500px" height="351px">
